<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Vrundhavan Collection ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --rose:#6B1D3B;--rose-l:#9B2D5A;--rose-pale:#FDF0F4;
  --gold:#C9A84C;--gold-l:#E8C87A;--cream:#FDF6EE;
  --text:#2C1810;--text-l:#8B6F6F;--border:#E8D5C4;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;}
#three-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
#doodle-layer{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.doodle-svg{position:absolute;opacity:0;animation:doodleFadeIn 1.5s ease forwards;}
@keyframes doodleFadeIn{to{opacity:1;}}
.petal{position:fixed;pointer-events:none;z-index:2;animation:petalFall linear forwards;}
@keyframes petalFall{0%{transform:translateY(-40px) rotate(0deg);opacity:1;}80%{opacity:.9;}100%{transform:translateY(110vh) rotate(720deg) translateX(50px);opacity:0;}}
.conf{position:fixed;pointer-events:none;z-index:201;border-radius:2px;animation:confFall ease-out forwards;}
@keyframes confFall{0%{opacity:1;transform:translateY(0) rotate(0);}100%{opacity:0;transform:translateY(130px) rotate(540deg) translateX(var(--cx));}}
.sparkle{position:fixed;pointer-events:none;z-index:202;animation:sparkPop .9s ease-out forwards;}
@keyframes sparkPop{0%{opacity:1;transform:scale(0)rotate(0);}50%{opacity:1;transform:scale(1.4)rotate(180deg);}100%{opacity:0;transform:scale(0)rotate(360deg)translateY(-50px);}}
.floatie{position:fixed;pointer-events:none;z-index:2;animation:floatUp linear forwards;}
@keyframes floatUp{0%{opacity:0;transform:translateY(0)scale(0)rotate(0);}10%{opacity:1;}80%{opacity:.9;}100%{opacity:0;transform:translateY(-110vh)scale(1.1)rotate(360deg);}}
/* NAV */
.nav{background:var(--rose);padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 24px rgba(107,29,59,.5);}
.nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:navShim 3s ease-in-out infinite;}
@keyframes navShim{0%,100%{opacity:.3;}50%{opacity:1;}}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.45rem;color:#fff;cursor:pointer;font-style:italic;text-shadow:0 1px 8px rgba(0,0,0,.3);transition:transform .2s;}
.nav-brand:hover{transform:scale(1.04);}
.nav-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;padding:.35rem .85rem;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.nav-back:hover{background:rgba(255,255,255,.28);transform:translateX(-3px);}
.nav-admin{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);border-radius:20px;padding:.3rem .75rem;font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.nav-admin:hover{background:rgba(255,255,255,.22);}
/* MARQUEE */
.marquee-wrap{overflow:hidden;background:linear-gradient(90deg,#4A0E25,var(--rose),#4A0E25);padding:.42rem 0;position:relative;z-index:5;}
.marquee-track{display:flex;gap:2rem;width:max-content;animation:marqueeScroll 20s linear infinite;}
@keyframes marqueeScroll{0%{transform:translateX(0);}100%{transform:translateX(-50%)}}
.marquee-item{color:rgba(255,255,255,.8);font-size:.73rem;letter-spacing:.1em;white-space:nowrap;font-weight:500;}
.marquee-item b{color:var(--gold-l);}
/* HERO */
.home-hero{text-align:center;padding:2.8rem 1.5rem 1rem;position:relative;z-index:5;}
.ornament{color:var(--gold);font-size:1rem;letter-spacing:.5em;margin-bottom:.6rem;animation:ornPulse 2s ease-in-out infinite alternate;}
@keyframes ornPulse{from{letter-spacing:.3em;opacity:.7;}to{letter-spacing:.7em;opacity:1;}}
.home-hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,7vw,3.8rem);color:var(--rose);font-weight:700;line-height:1.1;margin-bottom:.6rem;}
.hero-word{display:inline-block;animation:waveIn .7s cubic-bezier(.34,1.56,.64,1) both;}
.hero-word:nth-child(1){animation-delay:.1s;}
.hero-word:nth-child(2){animation-delay:.25s;}
@keyframes waveIn{from{opacity:0;transform:translateY(28px)rotate(-8deg);}to{opacity:1;transform:none;}}
.tagline{color:var(--text-l);font-size:.95rem;animation:heroIn .8s .4s ease both;}
@keyframes heroIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.home-divider{display:flex;align-items:center;gap:.8rem;max-width:240px;margin:1.3rem auto 1.8rem;}
.home-divider::before,.home-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.home-divider span{color:var(--gold);font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;}
/* CATEGORY */
.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:560px;margin:0 auto;padding:0 1rem 2.5rem;position:relative;z-index:5;}
.cat-card{position:relative;border-radius:28px;overflow:hidden;cursor:pointer;aspect-ratio:3/4;border:none;padding:0;background:none;transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s;text-align:center;}
.cat-card:hover{transform:translateY(-12px)rotate(-1.5deg)scale(1.04);box-shadow:0 30px 65px rgba(0,0,0,.32);}
.cat-card:active{transform:scale(.95);}
.cat-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:1.5rem;position:relative;overflow:hidden;}
.cat-sarees .cat-inner{background:linear-gradient(155deg,#a0305e 0%,#4A0E25 50%,#180408 100%);}
.cat-acc .cat-inner{background:linear-gradient(155deg,#D4B05A 0%,#9C7A2A 50%,#4a3000 100%);}
.cat-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(255,255,255,.14);animation:ringExp 3.5s ease-out infinite;}
.cat-ring:nth-child(1){width:70px;height:70px;top:calc(50% - 35px);left:calc(50% - 35px);}
.cat-ring:nth-child(2){width:120px;height:120px;top:calc(50% - 60px);left:calc(50% - 60px);animation-delay:.9s;}
.cat-ring:nth-child(3){width:180px;height:180px;top:calc(50% - 90px);left:calc(50% - 90px);animation-delay:1.8s;}
@keyframes ringExp{0%{opacity:.7;transform:scale(.4);}100%{opacity:0;transform:scale(2.2);}}
.cat-emoji{font-size:3.5rem;margin-bottom:.6rem;position:relative;z-index:2;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5));animation:bobFloat 2.6s ease-in-out infinite;}
@keyframes bobFloat{0%,100%{transform:translateY(0)scale(1)rotate(-4deg);}50%{transform:translateY(-14px)scale(1.1)rotate(4deg);}}
.cat-name{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:700;color:#fff;margin-bottom:.2rem;position:relative;z-index:2;text-shadow:0 2px 10px rgba(0,0,0,.35);}
.cat-count{font-size:.73rem;color:rgba(255,255,255,.72);margin-bottom:.7rem;position:relative;z-index:2;}
.cat-btn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.42);border-radius:20px;color:#fff;font-size:.78rem;font-weight:600;padding:.42rem 1.1rem;font-family:inherit;cursor:pointer;position:relative;z-index:2;transition:all .2s;backdrop-filter:blur(4px);}
.cat-card:hover .cat-btn{background:rgba(255,255,255,.32);transform:scale(1.06);}
/* VIDEO SECTION */
.video-section{padding:0 1rem 2.5rem;max-width:720px;margin:0 auto;position:relative;z-index:5;}
.section-header{text-align:center;margin-bottom:1.2rem;}
.section-header h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--rose);font-style:italic;}
.section-header p{font-size:.8rem;color:var(--text-l);margin-top:.2rem;}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.9rem;}
.video-card{background:var(--white);border-radius:20px;overflow:hidden;border:1px solid var(--border);transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;cursor:pointer;}
.video-card:hover{transform:translateY(-7px)scale(1.01);box-shadow:0 18px 44px rgba(107,29,59,.2);}
.video-thumb{position:relative;aspect-ratio:16/9;background:#1a0a10;overflow:hidden;}
.video-thumb video{width:100%;height:100%;object-fit:cover;display:block;}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);transition:background .2s;}
.video-card:hover .play-overlay{background:rgba(0,0,0,.55);}
.play-btn{width:54px;height:54px;background:linear-gradient(135deg,var(--rose),var(--rose-l));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;box-shadow:0 4px 18px rgba(107,29,59,.55);}
.video-card:hover .play-btn{transform:scale(1.22);box-shadow:0 8px 28px rgba(107,29,59,.65);}
.video-card-body{padding:.75rem .9rem .9rem;}
.video-card-body h4{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--rose);margin-bottom:.15rem;}
.video-card-body p{font-size:.74rem;color:var(--text-l);}
/* PAGE HEADER */
.page-header{background:linear-gradient(135deg,var(--rose) 0%,#3a0a1e 100%);padding:1.8rem 1.2rem 1.4rem;color:#fff;position:relative;overflow:hidden;}
.page-header::before{content:'✦  ✦  ✦';position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:2rem;color:rgba(255,255,255,.05);letter-spacing:.4rem;}
.page-header h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;margin-bottom:.15rem;position:relative;}
.page-header p{font-size:.83rem;color:rgba(255,255,255,.65);position:relative;}
/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem;padding:1.2rem;max-width:1000px;margin:0 auto;}
.product-card{background:var(--white);border-radius:20px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;position:relative;}
.product-card:hover{transform:translateY(-8px)scale(1.02)rotate(.4deg);box-shadow:0 20px 50px rgba(107,29,59,.22);}
.product-card:active{transform:scale(.94);}
.product-card-media{position:relative;aspect-ratio:3/4;overflow:hidden;background:#f5e8ec;}
.product-card-media img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease;}
.product-card:hover .product-card-media img{transform:scale(1.09);}
.product-card-media .video-pill{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;font-size:.62rem;font-weight:600;padding:.2rem .5rem;border-radius:10px;}
.new-badge{position:absolute;top:9px;left:9px;background:linear-gradient(135deg,#E8293A,#C0182A);color:#fff;font-size:.64rem;font-weight:700;letter-spacing:.07em;padding:.25rem .6rem;border-radius:20px;text-transform:uppercase;box-shadow:0 2px 10px rgba(220,30,50,.5);animation:badgePop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes badgePop{from{transform:scale(0)rotate(-15deg);}to{transform:scale(1)rotate(0);}}
.pc-body{padding:.75rem;}
.pc-body h3{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--rose);font-weight:600;margin-bottom:.15rem;line-height:1.3;}
.pc-body p{font-size:.72rem;color:var(--text-l);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.pc-tap{font-size:.7rem;color:var(--gold);font-weight:600;margin-top:.4rem;}
/* SHIMMER */
.skel{background:linear-gradient(90deg,#f0e8ec 25%,#f8f0f4 50%,#f0e8ec 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
/* EMPTY */
.empty-state{text-align:center;padding:4rem 1.5rem;color:var(--text-l);}
.empty-state .ei{font-size:3.5rem;margin-bottom:1rem;animation:bobFloat 3s ease-in-out infinite;}
.loading{text-align:center;padding:4rem 1.5rem;color:var(--text-l);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--rose);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:150;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;backdrop-filter:blur(4px);}
@media(min-width:500px){.modal-overlay{align-items:center;padding:1rem;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--white);border-radius:28px 28px 0 0;max-width:480px;width:100%;overflow-y:auto;max-height:95vh;animation:slideUp .35s cubic-bezier(.34,1.56,.64,1);}
@media(min-width:500px){.modal{border-radius:28px;max-height:90vh;}}
@keyframes slideUp{from{transform:translateY(80px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-img-wrap{position:relative;overflow:hidden;}
.modal-img-wrap img{width:100%;max-height:330px;object-fit:cover;display:block;transition:transform .5s;}
.modal-img-wrap:hover img{transform:scale(1.04);}
.modal-new-badge{position:absolute;top:14px;left:14px;background:linear-gradient(135deg,#E8293A,#C0182A);color:#fff;font-size:.74rem;font-weight:700;letter-spacing:.08em;padding:.3rem .75rem;border-radius:20px;text-transform:uppercase;}
.modal-close-btn{position:absolute;top:12px;right:12px;width:36px;height:36px;background:rgba(0,0,0,.45);border:none;border-radius:50%;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close-btn:hover{background:rgba(0,0,0,.65);transform:scale(1.1)rotate(90deg);}
.modal-body{padding:1.4rem;}
.modal-cat{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);font-weight:600;margin-bottom:.35rem;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--rose);font-weight:700;margin-bottom:.3rem;}
.modal-added{font-size:.72rem;color:var(--text-l);margin-bottom:.4rem;}
.modal-desc{font-size:.87rem;color:var(--text-l);margin-bottom:.9rem;line-height:1.65;}
.modal-msg{background:linear-gradient(135deg,var(--rose-pale),#fff8f0);border-radius:16px;padding:.9rem 1.1rem;font-size:.87rem;color:var(--rose);margin-bottom:1.1rem;text-align:center;line-height:1.5;border:1px solid rgba(107,29,59,.12);}
.modal-msg strong{display:block;font-size:1rem;margin-bottom:.15rem;font-family:'Cormorant Garamond',serif;}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
@media(max-width:400px){.modal-btns{grid-template-columns:1fr;}}
.btn-see{background:var(--white);border:1.5px solid var(--border);color:var(--text);border-radius:14px;padding:.85rem;font-size:.9rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-see:hover{border-color:var(--rose);background:var(--rose-pale);}
.btn-confirm{background:linear-gradient(135deg,#25D366,#128C7E);border:none;color:#fff;border-radius:14px;padding:.85rem;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.4rem;transition:all .2s;box-shadow:0 4px 14px rgba(37,211,102,.45);}
.btn-confirm:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(37,211,102,.55);}
.wa-icon{width:17px;height:17px;flex-shrink:0;}
/* ADMIN LOGIN */
.admin-login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;z-index:5;}
.al-card{background:var(--white);border-radius:28px;padding:2.3rem;max-width:380px;width:100%;border:1px solid var(--border);text-align:center;box-shadow:0 14px 55px rgba(107,29,59,.14);animation:slideUp .4s ease both;}
.al-lock{font-size:3rem;margin-bottom:.7rem;animation:bobFloat 3s ease-in-out infinite;}
.al-card h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--rose);margin-bottom:.3rem;}
.al-card p{font-size:.83rem;color:var(--text-l);margin-bottom:1.6rem;}
.inp{width:100%;padding:.8rem 1rem;border:1.5px solid var(--border);border-radius:12px;font-size:.93rem;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--cream);color:var(--text);}
.inp:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(107,29,59,.09);}
textarea.inp{resize:vertical;min-height:78px;}
select.inp{cursor:pointer;}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--rose),var(--rose-l));color:#fff;border:none;border-radius:12px;padding:.9rem;font-size:.93rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:.35rem;box-shadow:0 4px 16px rgba(107,29,59,.35);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(107,29,59,.45);}
.btn-primary:active{transform:scale(.97);}
.err-msg{color:#c0392b;font-size:.82rem;margin-bottom:.6rem;}
.ok-msg{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:10px;padding:.8rem 1rem;color:#2E7D32;font-size:.87rem;margin-bottom:.9rem;}
.back-link{background:none;border:none;color:var(--text-l);cursor:pointer;font-size:.84rem;margin-top:.7rem;font-family:inherit;transition:color .2s;}
.back-link:hover{color:var(--rose);}
/* ADMIN */
.admin-wrap{min-height:100vh;background:var(--cream);}
.admin-head{background:linear-gradient(135deg,var(--rose),#3a0a1e);padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;}
.admin-head h2{font-family:'Cormorant Garamond',serif;color:#fff;font-size:1.2rem;font-style:italic;}
.head-btns{margin-left:auto;display:flex;gap:.5rem;}
.admin-head button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:.38rem .82rem;font-size:.8rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.admin-head button:hover{background:rgba(255,255,255,.25);}
.admin-inner{max-width:820px;margin:0 auto;padding:1.2rem;}
.new-info{background:#FFF8E1;border:1px solid #FFD54F;border-radius:12px;padding:.75rem .9rem;font-size:.8rem;color:#7B5800;margin-bottom:1.1rem;display:flex;align-items:flex-start;gap:.5rem;}
.atabs{display:flex;gap:.4rem;margin-bottom:1.1rem;background:var(--white);border-radius:14px;padding:.35rem;border:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.atab{flex:1;min-width:70px;background:none;border:none;color:var(--text-l);border-radius:10px;padding:.5rem .4rem;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;}
.atab.active{background:var(--rose);color:#fff;}
.asec{background:var(--white);border-radius:18px;border:1px solid var(--border);padding:1.3rem;}
.asec h3{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--rose);margin-bottom:1.1rem;padding-bottom:.65rem;border-bottom:1px solid var(--border);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
@media(max-width:480px){.frow{grid-template-columns:1fr;}}
.fgrp{margin-bottom:.9rem;}
.fgrp label{display:block;font-size:.76rem;font-weight:600;color:var(--text-l);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.05em;}
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:1.3rem;text-align:center;cursor:pointer;transition:all .2s;}
.upload-zone:hover{border-color:var(--rose);background:var(--rose-pale);}
.upload-preview{width:100%;max-height:200px;object-fit:contain;border-radius:10px;margin-top:.7rem;}
.upload-video-preview{width:100%;max-height:180px;border-radius:10px;margin-top:.7rem;}
.media-type-toggle{display:flex;gap:.5rem;margin-bottom:.7rem;}
.media-btn{flex:1;padding:.5rem;border-radius:10px;border:1.5px solid var(--border);background:none;color:var(--text-l);font-size:.83rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.media-btn.active{background:var(--rose);border-color:var(--rose);color:#fff;}
.btn-add{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;border:none;border-radius:12px;padding:.85rem 2rem;font-size:.93rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;width:100%;margin-top:.4rem;box-shadow:0 4px 16px rgba(201,168,76,.45);}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.55);}
.btn-add:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.man-tabs{display:flex;gap:.4rem;margin-bottom:.9rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.man-tab{background:none;border:1px solid var(--border);color:var(--text-l);border-radius:20px;padding:.38rem .9rem;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;}
.man-tab.active{background:var(--rose);border-color:var(--rose);color:#fff;}
.prod-list{display:flex;flex-direction:column;gap:.7rem;}
.prod-item{display:flex;align-items:center;gap:.8rem;background:var(--cream);border-radius:14px;padding:.75rem;border:1px solid var(--border);transition:all .2s;}
.prod-item:hover{box-shadow:0 4px 18px rgba(107,29,59,.1);transform:translateX(2px);}
.prod-thumb{width:56px;height:56px;object-fit:cover;border-radius:10px;flex-shrink:0;background:#f0dde5;}
.prod-info{flex:1;min-width:0;}
.prod-info h4{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.1rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.prod-info span{font-size:.72rem;color:var(--text-l);}
.admin-new-pill{background:linear-gradient(135deg,#E8293A,#C0182A);color:#fff;font-size:.6rem;font-weight:700;letter-spacing:.06em;padding:.15rem .45rem;border-radius:10px;text-transform:uppercase;}
.prod-actions{display:flex;gap:.4rem;flex-shrink:0;}
.btn-edit{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:8px;padding:.3rem .65rem;font-size:.76rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-edit:hover{background:var(--gold);color:#fff;}
.btn-del{background:none;border:1px solid #e74c3c;color:#e74c3c;border-radius:8px;padding:.3rem .65rem;font-size:.76rem;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-del:hover{background:#fdeaea;}
.video-icon-pill{background:rgba(107,29,59,.12);color:var(--rose);font-size:.65rem;font-weight:600;padding:.15rem .45rem;border-radius:8px;}
/* EDIT OVERLAY */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;backdrop-filter:blur(4px);}
@media(min-width:500px){.edit-overlay{align-items:center;padding:1rem;}}
.edit-modal{background:var(--white);border-radius:28px 28px 0 0;max-width:500px;width:100%;overflow-y:auto;max-height:95vh;padding:1.5rem;animation:slideUp .35s cubic-bezier(.34,1.56,.64,1);}
@media(min-width:500px){.edit-modal{border-radius:28px;max-height:90vh;}}
.edit-modal h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--rose);margin-bottom:1.1rem;display:flex;align-items:center;justify-content:space-between;}
.edit-close{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-l);font-size:.9rem;cursor:pointer;padding:.25rem .55rem;transition:all .2s;}
.edit-close:hover{border-color:var(--rose);color:var(--rose);}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%)translateY(100px);background:linear-gradient(135deg,var(--rose),var(--rose-l));color:#fff;padding:.8rem 1.6rem;border-radius:30px;font-size:.88rem;font-weight:500;z-index:500;box-shadow:0 8px 30px rgba(107,29,59,.5);transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%)translateY(0);}

// LIVE 3D WebGL PARTICLE FIELD

(function initWebGL(){
  var cv=document.getElementById('three-canvas');
  var gl=cv.getContext('webgl',{alpha:true,antialias:true,premultipliedAlpha:false});
  if(!gl)return;
  var W,H;
  function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;gl.viewport(0,0,W,H);}
  window.addEventListener('resize',rsz);rsz();

  var vs=`attribute vec2 aP;attribute float aS;attribute float aA;attribute vec3 aC;
  varying float vA;varying vec3 vC;uniform vec2 uR;
  void main(){vec2 c=(aP/uR)*2.0-1.0;c.y=-c.y;gl_Position=vec4(c,0,1);gl_PointSize=aS;vA=aA;vC=aC;}`;
  var fs=`precision mediump float;varying float vA;varying vec3 vC;
  void main(){vec2 d=gl_PointCoord-.5;float r=dot(d,d)*4.0;if(r>1.0)discard;
  float s=1.0-smoothstep(.3,1.0,r);gl_FragColor=vec4(vC,vA*s);}`;

  function mkS(t,src){var s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);return s;}
  var pg=gl.createProgram();
  gl.attachShader(pg,mkS(gl.VERTEX_SHADER,vs));
  gl.attachShader(pg,mkS(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(pg);gl.useProgram(pg);

  var N=140;
  var px=new Float32Array(N),py=new Float32Array(N),pvx=new Float32Array(N),pvy=new Float32Array(N);
  var ps=new Float32Array(N),pa=new Float32Array(N),pl=new Float32Array(N),pm=new Float32Array(N);
  var pcr=new Float32Array(N),pcg=new Float32Array(N),pcb=new Float32Array(N);
  var palette=[[.42,.11,.23],[.79,.66,.30],[.98,.85,.70],[.61,.18,.36],[.91,.78,.48],[1,.75,.8]];

  function initP(i){
    px[i]=Math.random()*W;py[i]=Math.random()*H;
    var spd=.15+Math.random()*.55,ang=Math.random()*Math.PI*2;
    pvx[i]=Math.cos(ang)*spd;pvy[i]=Math.sin(ang)*spd-.25;
    ps[i]=1.8+Math.random()*5.5;pm[i]=160+Math.random()*260;pl[i]=Math.random()*pm[i];
    var c=palette[Math.floor(Math.random()*palette.length)];pcr[i]=c[0];pcg[i]=c[1];pcb[i]=c[2];
  }
  for(var i=0;i<N;i++)initP(i);

  var pBuf=gl.createBuffer(),sBuf=gl.createBuffer(),aBuf=gl.createBuffer(),cBuf=gl.createBuffer();
  var posA=new Float32Array(N*2),sizA=new Float32Array(N),alpA=new Float32Array(N),colA=new Float32Array(N*3);
  var aP=gl.getAttribLocation(pg,'aP'),aS=gl.getAttribLocation(pg,'aS'),aA=gl.getAttribLocation(pg,'aA'),aC=gl.getAttribLocation(pg,'aC');
  var uR=gl.getUniformLocation(pg,'uR');
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  var mx=W/2,my=H/2,mActive=false;
  window.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;mActive=true;});
  window.addEventListener('touchmove',function(e){if(e.touches[0]){mx=e.touches[0].clientX;my=e.touches[0].clientY;mActive=true;}},{passive:true});

  function tick(){
    for(var i=0;i<N;i++){
      pl[i]++;
      if(pl[i]>pm[i]){initP(i);continue;}
      if(mActive){
        var dx=mx-px[i],dy=my-py[i],dist=Math.sqrt(dx*dx+dy*dy)+1;
        if(dist<180){pvx[i]+=dx/dist*.009;pvy[i]+=dy/dist*.009;}
      }
      pvx[i]*=.992;pvy[i]*=.992;
      px[i]+=pvx[i];py[i]+=pvy[i];
      if(px[i]<0)px[i]=W;if(px[i]>W)px[i]=0;
      if(py[i]<0)py[i]=H;if(py[i]>H)py[i]=0;
      var t=pl[i]/pm[i];pa[i]=Math.sin(t*Math.PI)*.65;
      posA[i*2]=px[i];posA[i*2+1]=py[i];sizA[i]=ps[i];alpA[i]=pa[i];colA[i*3]=pcr[i];colA[i*3+1]=pcg[i];colA[i*3+2]=pcb[i];
    }
    gl.clear(gl.COLOR_BUFFER_BIT);gl.useProgram(pg);gl.uniform2f(uR,W,H);
    gl.bindBuffer(gl.ARRAY_BUFFER,pBuf);gl.bufferData(gl.ARRAY_BUFFER,posA,gl.DYNAMIC_DRAW);gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,sBuf);gl.bufferData(gl.ARRAY_BUFFER,sizA,gl.DYNAMIC_DRAW);gl.enableVertexAttribArray(aS);gl.vertexAttribPointer(aS,1,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,aBuf);gl.bufferData(gl.ARRAY_BUFFER,alpA,gl.DYNAMIC_DRAW);gl.enableVertexAttribArray(aA);gl.vertexAttribPointer(aA,1,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,cBuf);gl.bufferData(gl.ARRAY_BUFFER,colA,gl.DYNAMIC_DRAW);gl.enableVertexAttribArray(aC);gl.vertexAttribPointer(aC,3,gl.FLOAT,false,0,0);
    gl.drawArrays(gl.POINTS,0,N);
    requestAnimationFrame(tick);
  }
  tick();
})();

// PETAL RAIN
// ══════════════════════════════════
var petals=['🌸','🌺','🌼','✿','❀','🌷','💮','🪷'];
function spawnPetal(){
  var el=document.createElement('div');
  el.className='petal';
  el.textContent=petals[Math.floor(Math.random()*petals.length)];
  var dur=4.5+Math.random()*5.5;
  el.style.cssText='left:'+Math.random()*100+'vw;top:-40px;font-size:'+(0.8+Math.random()*.9)+'rem;animation-duration:'+dur+'s;opacity:'+(0.35+Math.random()*.45);
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},dur*1000+200);
}
setInterval(spawnPetal,1100);
for(var _i=0;_i<6;_i++)setTimeout(spawnPetal,_i*200+600);

// floating hearts
var floatEs=['💕','🌸','✨','💖','🌺','⭐','💫','🪷'];
function spawnFloat(x,y){
  var el=document.createElement('div');
  el.className='floatie';
  el.textContent=floatEs[Math.floor(Math.random()*floatEs.length)];
  var dur=2.5+Math.random()*3;
  el.style.cssText='left:'+(x||Math.random()*window.innerWidth)+'px;top:'+(y||window.innerHeight*.8)+'px;font-size:'+(0.7+Math.random()*.7)+'rem;animation-duration:'+dur+'s';
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},dur*1000+100);
}
setInterval(function(){spawnFloat();},2800);

// ══════════════════════════════════
var confCols=['#E8293A','#C9A84C','#9B2D5A','#E8C87A','#6B1D3B','#FDF0F4','#fff','#FF8FAB'];
function confettiBurst(x,y,n){
  n=n||20;
  for(var i=0;i<n;i++){
    var el=document.createElement('div');
    el.className='conf';
    el.style.background=confCols[Math.floor(Math.random()*confCols.length)];
    el.style.left=(x-4)+'px';el.style.top=(y-4)+'px';
    el.style.setProperty('--cx',(Math.random()-0.5)*130+'px');
    var dur=.8+Math.random()*.7;
    el.style.cssText+='animation-delay:'+(Math.random()*.25)+'s;animation-duration:'+dur+'s;width:'+(5+Math.random()*7)+'px;height:'+(4+Math.random()*6)+'px;transform:rotate('+Math.random()*360+'deg)';
    document.body.appendChild(el);
    setTimeout(function(e){e.remove();},(dur*1000+400),el);
  }
}

    el.className='sparkle';
    el.textContent=spkEs[Math.floor(Math.random()*spkEs.length)];

  if(s<60)return 'just now';
  var m=Math.floor(s/60);if(m<60)return m+'m ago';
  var h=Math.floor(m/60);if(h<24)return h+'h ago';

async function doLogin(){
  var inp=document.getElementById('passInp');var val=inp?inp.value:'';
  var enc=new TextEncoder();
  var hb=await crypto.subtle.digest('SHA-256',enc.encode(val));
  var hx=Array.from(new Uint8Array(hb)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  var stored=localStorage.getItem('zg_pass')||PASS_HASH;
  if(hx===stored){
    state.adminAuth=true;state.passErr=false;state.view='admin';state.adminTab='add';
    sessionStorage.setItem('vc_admin','1');render();showToast('✨ Welcome back, Admin!');
    confettiBurst(window.innerWidth/2,window.innerHeight/2,35);
  }else{state.passErr=true;render();}
}

async function changePassword(){
  var old=document.getElementById('cpOld').value,np=document.getElementById('cpNew').value,nc=document.getElementById('cpConfirm').value;
  var enc=new TextEncoder();
  var oh=Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256',enc.encode(old)))).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  var stored=localStorage.getItem('zg_pass')||PASS_HASH;
  if(oh!==stored){state.cpErr='Current password is incorrect.';state.cpOk=false;render();return;}
  if(np.length<6){state.cpErr='New password must be at least 6 characters.';state.cpOk=false;render();return;}
  if(np!==nc){state.cpErr='Passwords do not match.';state.cpOk=false;render();return;}
  var nh=Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256',enc.encode(np)))).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  localStorage.setItem('zg_pass',nh);state.cpErr='';state.cpOk=true;render();showToast('✅ Password updated!');
}
function handleFile(inp){if(inp.files&&inp.files[0])compressAndSet(inp.files[0]);}
function handleDrop(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f){if(f.type.startsWith('video/'))handleVideoFile(f);else compressAndSet(f);}}
function handleVideoFile(file){
  var r=new FileReader();r.onload=function(ev){state.form.video=ev.target.result;state.videoPreview=ev.target.result;state.form.img=null;state.preview=null;render();};r.readAsDataURL(file);
}
function compressAndSet(file){
  var r=new FileReader();r.onload=function(ev){
    var img=new Image();img.onload=function(){
      var c=document.createElement('canvas'),MAX=820,w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      var cp=c.toDataURL('image/jpeg',.72);state.form.img=cp;state.preview=cp;state.form.video=null;state.videoPreview=null;render();
    };img.src=ev.target.result;
  };r.readAsDataURL(file);
}
function addProduct(){
  var f=state.form;
  if(!f.name.trim()||(f.mediaType==='image'&&!f.img)||(f.mediaType==='video'&&!f.video)){alert('Please enter a name and upload media.');return;}
  state.saving=true;render();
  var data={name:f.name.trim(),category:f.category,desc:f.desc.trim(),addedAt:Date.now()};
  if(f.mediaType==='image'){data.img=f.img;data.mediaType='image';}else{data.video=f.video;data.mediaType='video';data.img=null;}
  db.collection('products').add(data).then(function(){
    state.form={name:'',category:'sarees',desc:'',mediaType:'image',img:null,video:null};
    state.preview=null;state.videoPreview=null;state.saving=false;render();

        :(s.videoPreview?'<video src="'+s.videoPreview+'" class="upload-video-preview" controls></video><p style="color:var(--text-l);font-size:.74rem;margin-top:.4rem">Click to change</p>':'<div style="font-size:2rem">🎬</div><p style="color:var(--text-l);font-size:.87rem">Click or drag video</p>'))
      +'</div></div>'
      +'<button class="btn-add" onclick="addProduct()"'+(s.saving?' disabled':'')+'>'+(s.saving?'Uploading...':'✨ Add Item')+'</button>';

    var vAdm='<div class="fgrp"><label>Video Title *</label><input class="inp" type="text" id="vTitle" placeholder="e.g. Saree Draping Tutorial"/></div>'
      +'<div class="fgrp"><label>Description (optional)</label><textarea class="inp" id="vDesc" placeholder="Brief description..."></textarea></div>'
      +'<div class="fgrp"><label>Video File *</label><div class="upload-zone" onclick="document.getElementById(\'vFile\').click()"><input type="file" id="vFile" accept="video/*" onchange="handleVideoUpload(this)" style="display:none"/>'
      +(s.videoFormPreview?'<video src="'+s.videoFormPreview+'" class="upload-video-preview" controls></video><p style="color:var(--text-l);font-size:.74rem;margin-top:.4rem">Click to change</p>':'<div style="font-size:2rem">🎬</div><p style="color:var(--text-l);font-size:.87rem">Click to upload video</p>')
      +'</div></div><button class="btn-add" onclick="addVideo()"'+(s.videoSaving?' disabled':'')+'>'+(s.videoSaving?'Uploading...':'🎬 Add Video')+'</button>'
      +'<div style="margin-top:1.4rem"><h4 style="font-family:\'Cormorant Garamond\',serif;font-size:1.1rem;color:var(--rose);margin-bottom:.8rem">Videos ('+s.videos.length+')</h4>'
      +(s.videos.length===0?'<p style="color:var(--text-l);font-size:.84rem">No videos yet.</p>'
        :s.videos.map(function(v){return'<div class="prod-item"><div class="prod-thumb" style="background:#1a0a10;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem">▶</div><div class="prod-info"><h4>'+esc(v.title)+'</h4><span>'+timeAgo(v.addedAt)+'</span></div><button class="btn-del" onclick="deleteVideo(\''+v.id+'\')">🗑️</button></div>';}).join(''))
      +'</div>';

    var manHTML='<div class="man-tabs"><button class="man-tab'+(s.manTab==='sarees'?' active':'')+'" onclick="setManTab(\'sarees\')">Sarees ('+counts().sarees+')</button>'
      +'<button class="man-tab'+(s.manTab==='accessories'?' active':'')+'" onclick="setManTab(\'accessories\')">Accessories ('+counts().accessories+')</button></div>'
      +'<div class="prod-list">'+(manItems.length===0?'<p style="color:var(--text-l);text-align:center;padding:1.5rem 0;font-size:.87rem">No items yet.</p>'
        :manItems.map(function(p){var isnew=isNew(p),hv=p.mediaType==='video';
          return'<div class="prod-item">'+(hv?'<div class="prod-thumb" style="background:#1a0a10;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;border-radius:10px;flex-shrink:0">▶</div>'
            :'<img src="'+esc(p.img||'')+'" alt="'+esc(p.name)+'" class="prod-thumb"/>')
            +'<div class="prod-info"><h4>'+esc(p.name)+(isnew?'<span class="admin-new-pill">NEW</span>':'')+(hv?'<span class="video-icon-pill">🎬</span>':'')+'</h4>'
            +'<span>'+(p.category==='sarees'?'🥻 Saree':'💎 Accessory')+' · '+timeAgo(p.addedAt)+'</span></div>'
            +'<div class="prod-actions"><button class="btn-edit" onclick="startEdit(\''+p.id+'\')">✏️</button><button class="btn-del" onclick="deleteProduct(\''+p.id+'\')">🗑️</button></div></div>';}).join(''))
      +'</div>';

    var stgHTML='<h4 style="font-family:\'Cormorant Garamond\',serif;font-size:1.1rem;color:var(--rose);margin-bottom:1rem">Change Password</h4>'
      +'<div style="max-width:380px">'+(s.cpOk?'<div class="ok-msg">✓ Password changed!</div>':'')
      +'<div class="fgrp"><label>Current Password</label><input class="inp" type="password" id="cpOld" placeholder="Current password"/></div>'
      +'<div class="fgrp"><label>New Password</label><input class="inp" type="password" id="cpNew" placeholder="Min 6 characters"/></div>'
      +'<div class="fgrp"><label>Confirm New Password</label><input class="inp" type="password" id="cpConfirm" placeholder="Re-enter new password"/></div>'
      +(s.cpErr?'<div class="err-msg">'+s.cpErr+'</div>':'')
      +'<button class="btn-primary" onclick="changePassword()">Update Password</button></div>';

    var tc=s.adminTab==='add'?'<h3>✨ Add New Item</h3>'+addHTML
      :s.adminTab==='videos'?'<h3>🎬 Manage Videos</h3>'+vAdm
      :s.adminTab==='manage'?'<h3>📦 Manage Items</h3>'+manHTML
      :'<h3>⚙️ Settings</h3>'+stgHTML;

    app.innerHTML='<div class="admin-wrap"><div class="admin-head"><h2>🛍️ Vrundhavan — Admin</h2>'
      +'<div class="head-btns"><button onclick="goto(\'home\')">View Store →</button><button onclick="adminLogout()">Logout</button></div></div>'
      +'<div class="admin-inner"><div class="atabs">'
      +'<button class="atab'+(s.adminTab==='add'?' active':'')+'" onclick="setAdminTab(\'add\')">+ Add</button>'
      +'<button class="atab'+(s.adminTab==='videos'?' active':'')+'" onclick="setAdminTab(\'videos\')">🎬 Videos</button>'
      +'<button class="atab'+(s.adminTab==='manage'?' active':'')+'" onclick="setAdminTab(\'manage\')">📦 Manage</button>'
      +'<button class="atab'+(s.adminTab==='settings'?' active':'')+'" onclick="setAdminTab(\'settings\')">⚙️ Settings</button>'
      +'</div><div class="asec">'+tc+'</div></div></div>'+editOverlay;
    return;
  }
  goto('home');
}

loadProducts();
loadVideos();
</script>
</body>
</html>
